const ScoreCircle = ({ score, label }) => {
  const color = score >= 90 ? "#22c55e" : score >= 50 ? "#f97316" : "#ef4444";
  const r = 32, sw = 4, c = 2 * Math.PI * r, off = c - (score / 100) * c, d = (r + sw) * 2;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <svg width={d} height={d} style={{transform:"rotate(-90deg)"}}>
        <circle cx={r+sw} cy={r+sw} r={r} fill="none" stroke="#e5e7eb" strokeWidth={sw}/>
        <circle cx={r+sw} cy={r+sw} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"/>
        <text x={r+sw} y={r+sw} textAnchor="middle" dominantBaseline="central" style={{transform:"rotate(90deg)",transformOrigin:"center",fontSize:16,fontWeight:700,fill:color}}>{score}</text>
      </svg>
      <span style={{fontSize:12,color:"#6b7280"}}>{label}</span>
    </div>
  );
};

const Badge = ({ text, variant }) => {
  const styles = {
    red: {background:"#fef2f2",color:"#b91c1c",border:"1px solid #fecaca"},
    orange: {background:"#fff7ed",color:"#c2410c",border:"1px solid #fed7aa"},
    green: {background:"#f0fdf4",color:"#15803d",border:"1px solid #bbf7d0"},
    blue: {background:"#eff6ff",color:"#1d4ed8",border:"1px solid #bfdbfe"},
    gray: {background:"#f3f4f6",color:"#4b5563",border:"1px solid #e5e7eb"},
    purple: {background:"#faf5ff",color:"#7c3aed",border:"1px solid #e9d5ff"},
  };
  return <span style={{fontSize:11,padding:"2px 8px",borderRadius:999,...(styles[variant]||styles.gray)}}>{text}</span>;
};

                  <h4 style={{margin:0,fontWeight:600,color:"#1f2937"}}>Subaru Digital Assessment</h4>
                  <Badge text={`Visit: ${sc.date}`} variant="gray"/>
                </div>
                <p style={{fontSize:12,color:"#6b7280",margin:"0 0 16px"}}>{sc.dealer} — Consultant: {sc.consultant}</p>

                {/* Score circles */}
                <div style={{display:"flex",justifyContent:"space-around",marginBottom:24}}>
                  <ScoreCircle score={sc.scores.webUX} label="Web UX"/>
                  <ScoreCircle score={sc.scores.seo} label="SEO"/>
                  <ScoreCircle score={sc.scores.sem} label="SEM"/>
                </div>

                {/* Website Metrics */}
                <h4 style={{margin:"0 0 12px",fontWeight:600,color:"#1f2937",fontSize:13}}>Website Metrics</h4>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                  {sc.websiteMetrics.filter(m=>m.value).map((m,i)=>(
                    <div key={i} style={{background:"#f9fafb",borderRadius:8,padding:12,textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:"#111827"}}>{m.value}</div>
                      <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{m.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:16}}>
                  <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:4,marginBottom:4}}>
                    <span style={{fontSize:11,fontWeight:600,color:"#6b7280"}}></span>
                    <span style={{fontSize:11,fontWeight:600,color:"#6b7280",textAlign:"center"}}>Retailer</span>
                    <span style={{fontSize:11,fontWeight:600,color:"#6b7280",textAlign:"center"}}>National</span>
                    <span style={{fontSize:11,fontWeight:600,color:"#6b7280",textAlign:"center"}}>Benchmark</span>
                  </div>
                  {sc.websiteMetrics.filter(m=>m.retailer).map((m,i)=>(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:4,padding:"6px 0",borderBottom:"1px solid #f3f4f6"}}>
                      <span style={{fontSize:12,color:"#374151"}}>{m.label}</span>
                      <span style={{fontSize:12,fontWeight:600,color:"#111827",textAlign:"center"}}>{m.retailer}</span>
                      <span style={{fontSize:12,color:"#6b7280",textAlign:"center"}}>{m.national}</span>
                      <span style={{fontSize:12,color:"#6b7280",textAlign:"center"}}>{m.benchmark}</span>
                    </div>
                  ))}
                </div>

                {/* ILM */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
                  <div style={{background:"#f9fafb",borderRadius:8,padding:12,textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:700,color:"#111827"}}>{sc.ilm.leadVolume}</div>
                    <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>Lead Volume</div>
                  </div>
                  <div style={{background:"#f9fafb",borderRadius:8,padding:12,textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:700,color:"#111827"}}>{sc.ilm.newVLPViews.toLocaleString()}</div>
                    <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>New VLP Views</div>
                  </div>
                  <div style={{background:"#f9fafb",borderRadius:8,padding:12,textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:700,color:"#111827"}}>{sc.ilm.newVDPViews.toLocaleString()}</div>
                    <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>New VDP Views</div>
                  </div>
                </div>

                {/* Model SERPs */}
                <h4 style={{margin:"0 0 8px",fontWeight:600,color:"#1f2937",fontSize:13}}>Model SERP Rankings</h4>
                <div style={{marginBottom:16}}>
                  {sc.modelSERPs.map((m,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #f9fafb"}}>
                      <span style={{fontSize:12,color:"#374151",fontWeight:500}}>{m.model}</span>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <span style={{fontSize:11,color:"#6b7280"}}>Paid: #{m.paidRank}</span>
                        <span style={{fontSize:11,color:"#6b7280"}}>Org: #{m.orgRank}</span>
                        {m.vlas && <Badge text="VLAs" variant="green"/>}
                        <Badge text={m.status} variant="green"/>
                      </div>
                    </div>
                  ))}
                </div>

                {/* Action Items */}
                <h4 style={{margin:"0 0 8px",fontWeight:600,color:"#1f2937",fontSize:13}}>Action Items</h4>
                {sc.actionItems.map((a,i)=>(
                  <div key={i} style={{background:"#f9fafb",borderRadius:8,padding:12,marginBottom:8}}>
                    <div style={{display:"flex",gap:6,marginBottom:4}}>
                      <Badge text={a.category} variant="purple"/>
                      <Badge text={`Due: ${a.due}`} variant="gray"/>
                    </div>
                    <p style={{fontSize:12,color:"#374151",margin:"4px 0 0",fontWeight:500}}>{a.task}</p>
                    <p style={{fontSize:11,color:"#6b7280",margin:"2px 0 0"}}>Assigned: {a.assignee}</p>
                  </div>
                ))}

                {/* Recommendations */}
                <h4 style={{margin:"12px 0 8px",fontWeight:600,color:"#1f2937",fontSize:13}}>Shift Digital Recommendations</h4>
                {sc.recommendations.map((r,i)=>(
                  <div key={i} style={{background:"#f9fafb",borderRadius:8,padding:12,marginBottom:8}}>
                    <Badge text={r.category} variant="blue"/>
                    <p style={{fontSize:12,color:"#374151",margin:"6px 0 0",lineHeight:1.5}}>{r.text}</p>
                  </div>
                ))}
              </div>}

              {tab==="links" && <div>
                <h4 style={{margin:"0 0 16px",fontWeight:600,color:"#1f2937"}}>Backlink Stats</h4>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:24}}>
                  {[{v:backlinkStats.domainAuthority,l:"Domain Authority",c:"#111827"},{v:backlinkStats.referringDomains,l:"Referring Domains",c:"#111827"},{v:backlinkStats.linkVelocity,l:"Link Velocity",c:"#16a34a"}].map((s,i)=>(
                    <div key={i} style={{background:"#f9fafb",borderRadius:8,padding:16,textAlign:"center"}}>
                      <div style={{fontSize:s.v.toString().length>5?16:24,fontWeight:700,color:s.c}}>{s.v}</div>
                      <div style={{fontSize:11,color:"#6b7280",marginTop:4}}>{s.l}</div>
                    </div>
                  ))}
                </div>
                <h4 style={{margin:"0 0 12px",fontWeight:600,color:"#1f2937"}}>Top Referring Domains</h4>
                {topReferring.map((r,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f9fafb"}}>
                    <span style={{fontSize:13,color:"#374151"}}>{r.domain}</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#1f2937"}}>{r.rating}</span>
                  </div>
                ))}
              </div>}

              {tab==="aigeo" && <div>
                <h4 style={{margin:"0 0 16px",fontWeight:600,color:"#1f2937"}}>GEO Optimization</h4>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
                  <div style={{background:"#f9fafb",borderRadius:8,padding:16,textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"#f97316"}}>{geoData.geoScore}</div><div style={{fontSize:11,color:"#6b7280",marginTop:4}}>GEO Score</div></div>
                  <div style={{background:"#f9fafb",borderRadius:8,padding:16,textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:"#1f2937"}}>{geoData.citationPotential}</div><div style={{fontSize:11,color:"#6b7280",marginTop:4}}>Citation Potential</div></div>
                </div>
                <h4 style={{margin:"0 0 12px",fontWeight:600,color:"#1f2937"}}>Overall Visibility</h4>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                  <div style={{background:"#f9fafb",borderRadius:8,padding:16,textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"#f97316"}}>{geoData.visibility}</div><div style={{fontSize:11,color:"#6b7280",marginTop:4}}>Visibility</div></div>
                  <div style={{background:"#f9fafb",borderRadius:8,padding:16,textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"#1f2937"}}>{geoData.sentiment}</div><div style={{fontSize:11,color:"#6b7280",marginTop:4}}>Sentiment</div></div>
                </div>
              </div>}

              {tab==="cwv" && <div>
                <h4 style={{margin:"0 0 16px",fontWeight:600,color:"#1f2937"}}>Core Web Vitals (Real User Data)</h4>
                <p style={{fontSize:12,color:"#6b7280",margin:"0 0 16px"}}>Field data from Chrome UX Report — reflects actual user experience.</p>
                {currentSite.coreWebVitals.map((v,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f9fafb"}}>
                    <span style={{fontSize:13,color:"#374151"}}>{v.label}</span>
                    <span style={{fontSize:14,fontWeight:700,color:v.status==="green"?"#16a34a":v.status==="orange"?"#f97316":"#dc2626"}}>{v.value}</span>
                  </div>
                ))}
                <div style={{marginTop:16,padding:12,background:"#fef2f2",borderRadius:8,border:"1px solid #fecaca"}}>
                  <p style={{fontSize:12,color:"#991b1b",margin:0,fontWeight:600}}>Core Web Vitals Assessment: FAILED</p>
                  <p style={{fontSize:12,color:"#991b1b",margin:"4px 0 0"}}>CLS of 0.2 needs improvement (threshold: 0.1). Lab LCP is 15.3s (threshold: 2.5s).</p>
                </div>
              </div>}

              {tab==="passed" && <div>
                <h4 style={{margin:"0 0 12px",fontWeight:600,color:"#1f2937"}}>Passed Checks ({currentSite.passedChecks.length})</h4>
                <div style={{maxHeight:320,overflowY:"auto"}}>
                  {currentSite.passedChecks.map((c,i)=>(
                    <div key={i} style={{display:"flex",gap:12,padding:"8px 0",borderBottom:"1px solid #f9fafb"}}>
                      <IconCheck size={16} color="#22c55e" style={{flexShrink:0,marginTop:2}}/>
                      <div><div style={{fontSize:13,fontWeight:600,color:"#1f2937"}}>{c.title}</div><div style={{fontSize:12,color:"#6b7280"}}>{c.desc}</div></div>
                    </div>
                  ))}
                </div>
              </div>}
            </div>
          </div>

          {/* Agents */}
          <div style={{...card,padding:20}}>
            <h3 style={{margin:"0 0 16px",fontWeight:700,color:"#111827"}}>Active Agents</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
              {[
                {name:"SEO Agent",icon:<IconSearch size={16}/>,bg:"#fef2f2",fg:"#dc2626",status:"3 issues found"},
                {name:"PageSpeed",icon:<IconGauge size={16}/>,bg:"#fef2f2",fg:"#dc2626",status:"Perf: 18/100"},
                {name:"Content Writer",icon:<IconBook size={16}/>,bg:"#faf5ff",fg:"#9333ea",status:"1 draft"},
                {name:"X / Twitter",icon:<IconTwitter size={16}/>,bg:"#eff6ff",fg:"#2563eb",status:"1 post ready"},
                {name:"Reddit Agent",icon:<IconMsg size={16}/>,bg:"#fff7ed",fg:"#ea580c",status:"1 opportunity"},
                {name:"Site Scraper",icon:<IconGlobe size={16}/>,bg:"#f0fdf4",fg:"#16a34a",status:"Live: 40 imgs, 56 links"},
              ].map((a,i)=>(
                <div key={i} style={{border:"1px solid #f3f4f6",borderRadius:8,padding:12,cursor:"pointer"}}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                  <div style={{width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",background:a.bg,color:a.fg,marginBottom:8}}>{a.icon}</div>
                  <div style={{fontSize:13,fontWeight:600,color:"#1f2937"}}>{a.name}</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>{a.status}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      )}

      {/* Document Modal */}
      {activeDoc && <div onClick={()=>setActiveDoc(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,maxWidth:640,width:"100%",maxHeight:"80vh",overflowY:"auto",padding:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h2 style={{margin:0,fontSize:20,fontWeight:700,color:"#111827"}}>{activeDoc==="product"?"Product Information":activeDoc==="competitor"?"Competitor Analysis":"Brand Voice"}</h2>
            <button onClick={()=>setActiveDoc(null)} style={{background:"transparent",border:"none",fontSize:24,color:"#9ca3af",cursor:"pointer"}}>×</button>
          </div>
          {activeDoc==="product" && <div style={{fontSize:13,color:"#374151",lineHeight:1.8}}>
            <p><strong>Product Name:</strong> Mark Miller Subaru</p>
            <p><strong>Website:</strong> markmillersubaru.com</p>
            <p><strong>One-liner:</strong> A Salt Lake City area Subaru dealership with two locations where customers can browse, buy, and service Subaru vehicles.</p>
            <p><strong>Product Category:</strong> Car dealership, Auto dealer, Subaru dealership</p>
            <p><strong>Target Customers:</strong> Car buyers and Subaru owners in the Salt Lake City, Utah area.</p>
            <p><strong>Business Model:</strong> Vehicle sales (new and pre-owned), Automotive service and maintenance</p>
            <p><strong>Key Features:</strong> New Subaru inventory search (Ascent, BRZ, Crosstrek, Forester, Outback, Legacy, WRX, Impreza), Pre-owned vehicle search, Online service scheduling for Midtown and South Towne, Inventory filtering by payment type and price</p>
            <p><strong>Primary CTA:</strong> Search New Vehicles</p>
          </div>}
          {activeDoc==="competitor" && <div style={{fontSize:13,color:"#374151",lineHeight:1.8}}>
            <p>Key competitors in the Salt Lake City Subaru market:</p>
            <div style={{background:"#f9fafb",borderRadius:8,padding:12,margin:"8px 0"}}><strong>Nate Wade Subaru</strong> — Downtown SLC, strong local reputation, DA ~42</div>
            <div style={{background:"#f9fafb",borderRadius:8,padding:12,margin:"8px 0"}}><strong>Tim Dahle Subaru</strong> — South Jordan, aggressive digital marketing, DA ~38</div>
            <div style={{background:"#f9fafb",borderRadius:8,padding:12,margin:"8px 0"}}><strong>Larry H. Miller Dealerships</strong> — Multi-brand competitor, high brand awareness, DA ~55</div>
            <p><strong>Mark Miller Subaru's Advantage:</strong> Two strategic locations, strong domain authority (55), established service reputation, and growing online presence.</p>
          </div>}
          {activeDoc==="brand" && <div style={{fontSize:13,color:"#374151",lineHeight:1.8}}>
            <p><strong>Tone:</strong> Friendly, trustworthy, community-oriented</p>
            <p><strong>Voice:</strong> Knowledgeable but approachable — like a helpful neighbor who knows everything about Subarus</p>
            <p><strong>Values:</strong> Customer-first service, Utah outdoor lifestyle, environmental responsibility, family safety</p>
            <p><strong>Key Messages:</strong> "Two locations to serve you better," "Your Salt Lake City Subaru experts," "Adventure starts here"</p>
            <p><strong>Audience Persona:</strong> Active Utah families and outdoor enthusiasts aged 28-55 who value safety, reliability, and all-weather capability</p>
          </div>}
        </div>
      </div>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
