name: Daily SEO Audit

on:
  schedule:
    - cron: '0 14 * * *'  # 7 AM Mountain Time (UTC-7)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SEO audit and update dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/audit.mjs

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily SEO audit $(date -u +%Y-%m-%d)"
            git push
          fi
